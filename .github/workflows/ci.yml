# workflow_api/.github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: workflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
      - name: Install deps
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3
      - name: Setup DB
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/workflow_test
        run: |
          bundle exec rails db:create db:migrate RAILS_ENV=test
      - name: Run tests
        run: bundle exec rspec
